{% extends 'blog/base.html' %} {% block content %}

<div class="d-flex justify-content-between mb-3">
  <h2>Dashboard</h2>
  <a href="{% url 'add_post' %}" class="btn btn-primary">Add Post</a>
  <a class="btn btn-primary" href="/login">Log Out</a>
</div>

<table class="table table-striped">
  <tr>
    <th>Title</th>
    <th>Content</th>
    <th>Actions</th>
  </tr>

  {% for post in posts %}
  <tr>
    <td>{{ post.title }}</td>
    <td>{{ post.content }}</td>
    <td>
      <a href="{% url 'edit_post' post.id %}" class="btn btn-warning btn-sm"
        >Edit</a
      >
      <a href="{% url 'delete_post' post.id %}" class="btn btn-danger btn-sm"
        >Delete</a
      >
    </td>
  </tr>

  <div class="modal fade" id="deleteModal{{ post.id }}" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title">Confirm Delete</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>
        </div>

        <div class="modal-body text-center">
          <p>Are you sure you want to delete this post?</p>
          <strong>{{ post.title }}</strong>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">
            Cancel
          </button>

          <form method="POST" action="{% url 'delete_post' post.id %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</table>

{% endblock %}
